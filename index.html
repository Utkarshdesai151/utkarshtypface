<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    Utkarsh — Frontend Developer & Creative Builder
  </title>

  <link rel="stylesheet" href="./style.css">

  <!-- GSAP -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollToPlugin.min.js"></script>
  <!-- Split Text -->
  <script defer src="https://unpkg.com/split-type"></script>

  <!-- Main Script -->
  <script defer src="./script.js"></script>

</head>

<body>



  <!-- =====================================
         HERO
    ====================================== -->

  <header class="hero" id="hero">
    <nav class="navbar">
      <div class="nav-circle"></div>
      <ul class="nav-links">
        <li><a href="#hero" class="nav-link active" data-color="#ffffff" data-color2="#cfd8ff">HOME</a></li>
        <li><a href="#about" class="nav-link" data-color="#ff4d4d" data-color2="#ff9d9d">ABOUT</a></li>
        <li><a href="#projects" class="nav-link" data-color="#3eff8b" data-color2="#9dffce">WORK</a></li>
        <li><a href="#contact" class="nav-link" data-color="#4d8dff" data-color2="#9dc3ff">CONTACT</a></li>
      </ul>
    </nav>

    <div class="hero-title-wrapper">

      <div class="hero-title">

        <span class="char">U</span>
        <span class="char">T</span>
        <span class="char">K</span>
        <span class="char">A</span>
        <span class="char">R</span>
        <span class="char">S</span>
        <span class="char">H</span>

      </div>
    </div>

    <div class="hero-meta">
      <div class="meta-item">
        FRONTEND DEVELOPER
      </div>
      <div class="divider"></div>
      <div class="meta-item">
        STUDENT
      </div>
      <div class="divider"></div>
      <div class="meta-item">
        MOVIE CRITIC
      </div>
    </div>
  </header>

  <!-- =====================================
         ABOUT + STATS
    ====================================== -->
  <div class="container">
    <section class="about-stats-section" id="about" >
      <div class="about-grid">

        <div class="about-content">

          <p class="about-description">
            Building immersive digital experiences
            through code, interaction and visual
            storytelling.
          </p>

        </div>

      </div>

      <div class="stats-container">

        <div class="stat-item">

          <h2 class="counter" data-count="1.5">
            0
          </h2>

          <span class="">+</span>

          <div class="stat-info">
            <p>Year</p>
            <p>Experience</p>
          </div>

        </div>

        <div class="stat-item">

          <h2 class="counter" data-count="20">
            0
          </h2>

          <span class="">+</span>

          <div class="stat-info">
            <p>Projects</p>
            <p>Created</p>
          </div>

        </div>

        <div class="stat-item">

          <h2 class="counter" data-count="5">
            0
          </h2>

          <span class="">+</span>

          <div class="stat-info">
            <p>Projects</p>
            <p>Deployed</p>
          </div>

        </div>

      </div>

    </section>
    <section id="projects" class="projects section">
      hrllo
    </section>
    <section id="contact" class="">
      contact
    </section>
  </div>
</body>

</html>
